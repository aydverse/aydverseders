<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AydverseDers — Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#2563eb);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.login-logo{font-size:22px;font-weight:700;color:#2563eb;margin-bottom:6px}
.login-logo span{color:#f59e0b}
.login-sub{font-size:13px;color:#6b7280;margin-bottom:28px}
.lock-icon{font-size:42px;margin-bottom:16px}
.login-box input{width:100%;padding:11px 14px;border:1.5px solid #d1d5db;border-radius:9px;font-size:14px;margin-bottom:12px;outline:none;transition:border .2s}
.login-box input:focus{border-color:#2563eb}
.login-btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#1d4ed8}
.login-err{color:#dc2626;font-size:13px;margin-top:10px;min-height:18px}
.attempt-warn{color:#d97706;font-size:12px;margin-top:6px}

#adminPanel{display:none}
header{background:#1e3a8a;color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-size:17px;font-weight:700}
.header-logo span{color:#f59e0b}
.last-update{font-size:12px;opacity:.7}
.logout-btn{padding:6px 14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;font-size:13px;cursor:pointer}
.logout-btn:hover{background:rgba(255,255,255,.25)}

.container{max-width:1100px;margin:28px auto;padding:0 20px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:22px 20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.stat-num{font-size:32px;font-weight:700;margin-bottom:4px}
.stat-lbl{font-size:13px;color:#6b7280}
.s-b{color:#f59e0b}.s-o{color:#16a34a}.s-i{color:#dc2626}.s-t{color:#2563eb}

.card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f3f4f6;flex-wrap:wrap;gap:10px}
.card-title{font-size:16px;font-weight:600}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap}
.f-btn{padding:5px 14px;border:1.5px solid #d1d5db;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:#374151;transition:all .15s}
.f-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
.refresh-btn{padding:6px 14px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.refresh-btn:hover{background:#1d4ed8}

table{width:100%;border-collapse:collapse}
th{padding:11px 14px;text-align:left;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;background:#f9fafb;border-bottom:1px solid #f3f4f6}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid #f9fafb;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge.beklemede{background:#fef3c7;color:#92400e}
.badge.onaylandi{background:#dcfce7;color:#166534}
.badge.iptal{background:#fee2e2;color:#991b1b}

.action-btns{display:flex;gap:6px;flex-wrap:wrap}
.a-btn{padding:5px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500}
.a-btn:hover{opacity:.8}
.a-onayla{background:#dcfce7;color:#166534}
.a-iptal{background:#fee2e2;color:#991b1b}
.a-sil{background:#f3f4f6;color:#6b7280}

.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.loading{text-align:center;padding:30px;color:#6b7280}

#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:#1e3a8a;color:#fff;border-radius:10px;font-size:14px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:1000;box-shadow:0 4px 16px rgba(0,0,0,.2)}
#toast.show{transform:translateY(0);opacity:1}

@media(max-width:700px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  th,td{padding:8px 10px;font-size:12px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="lock-icon">🔐</div>
    <div class="login-logo">Aydverse<span>Ders</span></div>
    <div class="login-sub">Admin Paneli — Yetkili Giriş</div>
    <input type="text" id="loginUser" placeholder="Kullanıcı adı" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Şifre" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Giriş Yap</button>
    <div class="login-err" id="loginErr"></div>
    <div class="attempt-warn" id="attemptWarn"></div>
  </div>
</div>

<!-- PANEL -->
<div id="adminPanel">
  <header>
    <div class="header-logo">🦊 Aydverse<span>Ders</span> — Admin</div>
    <div style="display:flex;align-items:center;gap:16px">
      <span class="last-update" id="lastUpdate"></span>
      <button class="logout-btn" onclick="doLogout()">⏻ Çıkış</button>
    </div>
  </header>

  <div class="container">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num s-b" id="sBeklemede">—</div><div class="stat-lbl">Beklemede</div></div>
      <div class="stat-card"><div class="stat-num s-o" id="sOnaylandi">—</div><div class="stat-lbl">Onaylandı</div></div>
      <div class="stat-card"><div class="stat-num s-i" id="sIptal">—</div><div class="stat-lbl">İptal</div></div>
      <div class="stat-card"><div class="stat-num s-t" id="sToplam">—</div><div class="stat-lbl">Toplam</div></div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-title">📋 Randevular</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="filter-btns">
            <button class="f-btn active" onclick="filterTable('hepsi',this)">Hepsi</button>
            <button class="f-btn" onclick="filterTable('beklemede',this)">Beklemede</button>
            <button class="f-btn" onclick="filterTable('onaylandi',this)">Onaylandı</button>
            <button class="f-btn" onclick="filterTable('iptal',this)">İptal</button>
          </div>
          <button class="refresh-btn" onclick="loadRandevular()">🔄 Yenile</button>
        </div>
      </div>
      <div id="tableWrap"><div class="loading">Yükleniyor...</div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
//  ⚙️  SUPABASE AYARLARI
// ════════════════════════════════════════
const SUPABASE_URL = 'https://xkppmiwnrymyafvgkxlo.supabase.co';
const SUPABASE_KEY = 'BURAYA_YENİ_ANON_KEY'; // ← yeni key buraya

async function sbFetch(path, opts = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(opts.headers || {})
    }
  });
}

// ── LOGIN / GÜVENLİK ──
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'AYDAR080528eyüp1ensar2umut3*';

const MAX_ATT = 5;
const LOCK_MS = 5 * 60 * 1000;
let attempts  = parseInt(sessionStorage.getItem('att') || '0');
let lockUntil = parseInt(sessionStorage.getItem('lock') || '0');

function doLogin() {
  const now = Date.now();
  if (now < lockUntil) {
    const s = Math.ceil((lockUntil - now) / 1000);
    document.getElementById('loginErr').textContent = `${s} saniye bekleyin.`;
    return;
  }
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('adminOk','1');
    sessionStorage.setItem('att','0');
    sessionStorage.removeItem('lock');
    showPanel();
  } else {
    attempts++;
    sessionStorage.setItem('att', attempts);
    if (attempts >= MAX_ATT) {
      lockUntil = Date.now() + LOCK_MS;
      sessionStorage.setItem('lock', lockUntil);
      document.getElementById('loginErr').textContent = '5 dakika kilitlendi.';
    } else {
      document.getElementById('loginErr').textContent = 'Hatalı kullanıcı adı veya şifre.';
      document.getElementById('attemptWarn').textContent = `Kalan hak: ${MAX_ATT - attempts}`;
    }
  }
}

function doLogout() {
  sessionStorage.removeItem('adminOk');
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadRandevular();
  setInterval(() => {
    document.getElementById('lastUpdate').textContent =
      'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  }, 1000);
}

window.onload = () => {
  if (sessionStorage.getItem('adminOk') === '1') showPanel();
};

// ── VERİ ──
let allData = [];
let currentFilter = 'hepsi';

async function loadRandevular() {
  document.getElementById('tableWrap').innerHTML = '<div class="loading">⏳ Yükleniyor...</div>';
  try {
    const res = await sbFetch('randevular?select=*&order=olusturma_tarihi.desc');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    renderStats();
    renderTable(currentFilter);
  } catch(e) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty">⚠️ Veriler yüklenemedi: ${e.message}<br><small>Supabase key ve URL'yi kontrol edin.</small></div>`;
  }
}

function renderStats() {
  document.getElementById('sBeklemede').textContent = allData.filter(x=>x.durum==='beklemede').length;
  document.getElementById('sOnaylandi').textContent = allData.filter(x=>x.durum==='onaylandi').length;
  document.getElementById('sIptal').textContent     = allData.filter(x=>x.durum==='iptal').length;
  document.getElementById('sToplam').textContent    = allData.length;
}

function renderTable(filter) {
  const list = filter === 'hepsi' ? allData : allData.filter(x => x.durum === filter);
  if (!list.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty">📭 Kayıt yok.</div>';
    return;
  }
  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Ad Soyad</th><th>Telefon</th><th>Branş</th>
        <th>Şehir</th><th>Not</th><th>Durum</th><th>Tarih</th><th>İşlem</th>
      </tr></thead>
      <tbody>
        ${list.map((r,i) => `
          <tr>
            <td>${i+1}</td>
            <td><strong>${esc(r.ad)}</strong></td>
            <td>${esc(r.telefon)||'—'}</td>
            <td>${esc(r.brans)||'—'}</td>
            <td>${esc(r.sehir)||'—'}</td>
            <td>${esc(r.not_alan)||'—'}</td>
            <td><span class="badge ${r.durum}">${r.durum}</span></td>
            <td>${fmtDate(r.olusturma_tarihi)}</td>
            <td>
              <div class="action-btns">
                ${r.durum!=='onaylandi'?`<button class="a-btn a-onayla" onclick="guncelle('${r.id}','onaylandi')">✓ Onayla</button>`:''}
                ${r.durum!=='iptal'?`<button class="a-btn a-iptal" onclick="guncelle('${r.id}','iptal')">✕ İptal</button>`:''}
                <button class="a-btn a-sil" onclick="sil('${r.id}')">🗑</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function filterTable(f, el) {
  currentFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable(f);
}

async function guncelle(id, durum) {
  try {
    const res = await sbFetch(`randevular?id=eq.${id}`, {
      method: 'PATCH',
      headers: {'Prefer':'return=minimal'},
      body: JSON.stringify({durum})
    });
    if (!res.ok) throw new Error();
    const idx = allData.findIndex(x => x.id === id);
    if (idx > -1) allData[idx].durum = durum;
    renderStats(); renderTable(currentFilter);
    showToast(durum === 'onaylandi' ? '✅ Onaylandı' : '❌ İptal edildi');
  } catch { showToast('⚠️ İşlem başarısız'); }
}

async function sil(id) {
  if (!confirm('Bu randevuyu silmek istediğinizden emin misiniz?')) return;
  try {
    const res = await sbFetch(`randevular?id=eq.${id}`, {method:'DELETE'});
    if (!res.ok) throw new Error();
    allData = allData.filter(x => x.id !== id);
    renderStats(); renderTable(currentFilter);
    showToast('🗑 Silindi');
  } catch { showToast('⚠️ Silinemedi'); }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch { return d; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
