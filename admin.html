<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AydverseDers — Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1a1a2e}
nav{background:#1e3a8a;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
nav h1{font-size:18px;font-weight:700}
nav span{font-size:13px;opacity:.8}
.container{max-width:1100px;margin:32px auto;padding:0 16px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center}
.stat-card .num{font-size:32px;font-weight:700;color:#2563eb}
.stat-card .lbl{font-size:13px;color:#6b7280;margin-top:4px}
.stat-card.green .num{color:#16a34a}
.stat-card.red .num{color:#dc2626}
.stat-card.yellow .num{color:#d97706}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:gap}
.card-header h2{font-size:16px;font-weight:600}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #d1d5db;background:#fff;font-size:13px;cursor:pointer;color:#374151}
.filter-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}
table{width:100%;border-collapse:collapse}
thead tr{background:#f8fafc}
th{padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e5e7eb}
td{padding:12px;font-size:13px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge.beklemede{background:#fef3c7;color:#d97706}
.badge.onaylandi{background:#dcfce7;color:#16a34a}
.badge.iptal{background:#fee2e2;color:#dc2626}
.action-btns{display:flex;gap:6px}
.btn{padding:5px 12px;border-radius:6px;border:none;font-size:12px;cursor:pointer;font-weight:500}
.btn-green{background:#dcfce7;color:#16a34a}.btn-green:hover{background:#16a34a;color:#fff}
.btn-red{background:#fee2e2;color:#dc2626}.btn-red:hover{background:#dc2626;color:#fff}
.btn-gray{background:#f1f5f9;color:#6b7280}.btn-gray:hover{background:#e5e7eb}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.loading{text-align:center;padding:40px;color:#6b7280;font-size:14px}
.refresh-btn{padding:8px 16px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.refresh-btn:hover{background:#1d4ed8}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
@media(max-width:600px){table{display:block;overflow-x:auto}.action-btns{flex-direction:column}}
</style>
</head>
<body>
<nav>
  <h1>🎓 AydverseDers — Admin Panel</h1>
  <span id="lastUpdate">Yükleniyor...</span>
</nav>

<div class="container">
  <div class="stats">
    <div class="stat-card yellow">
      <div class="num" id="statBeklemede">—</div>
      <div class="lbl">Beklemede</div>
    </div>
    <div class="stat-card green">
      <div class="num" id="statOnaylandi">—</div>
      <div class="lbl">Onaylandı</div>
    </div>
    <div class="stat-card red">
      <div class="num" id="statIptal">—</div>
      <div class="lbl">İptal</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statToplam">—</div>
      <div class="lbl">Toplam</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>📋 Randevular</h2>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="filters">
          <button class="filter-btn active" onclick="filterBy('hepsi')">Hepsi</button>
          <button class="filter-btn" onclick="filterBy('beklemede')">Beklemede</button>
          <button class="filter-btn" onclick="filterBy('onaylandi')">Onaylandı</button>
          <button class="filter-btn" onclick="filterBy('iptal')">İptal</button>
        </div>
        <button class="refresh-btn" onclick="loadRandevular()">🔄 Yenile</button>
      </div>
    </div>
    <div id="tableContainer">
      <div class="loading">Yükleniyor...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://kxppmiwnrymyafvgkxlo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PdWsTm33U9KeCgsz-e7uFw_3NwcqIOt';

let allData = [];
let currentFilter = 'hepsi';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function parseNotlar(notlar) {
  if (!notlar) return { ad: '—', telefon: '—', brans: '—', sehir: '—', not: '—' };
  const parts = notlar.split('|').map(s => s.trim());
  return {
    ad: parts[0] || '—',
    telefon: parts[1] || '—',
    brans: parts[2] || '—',
    sehir: parts[3] || '—',
    not: parts[4] || '—'
  };
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('tr-TR') + ' ' + d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

async function loadRandevular() {
  document.getElementById('tableContainer').innerHTML = '<div class="loading">Yükleniyor...</div>';
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/randevular?select=*&order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allData = await r.json();
    updateStats();
    renderTable();
    document.getElementById('lastUpdate').textContent = 'Son güncelleme: ' + formatDate(new Date().toISOString());
  } catch (e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty">❌ Veri yüklenemedi. Sayfayı yenileyin.</div>';
  }
}

function updateStats() {
  const beklemede = allData.filter(x => x.durum === 'beklemede').length;
  const onaylandi = allData.filter(x => x.durum === 'onaylandi').length;
  const iptal = allData.filter(x => x.durum === 'iptal').length;
  document.getElementById('statBeklemede').textContent = beklemede;
  document.getElementById('statOnaylandi').textContent = onaylandi;
  document.getElementById('statIptal').textContent = iptal;
  document.getElementById('statToplam').textContent = allData.length;
}

function filterBy(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable();
}

function renderTable() {
  const data = currentFilter === 'hepsi' ? allData : allData.filter(x => x.durum === currentFilter);
  if (!data.length) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty">Kayıt bulunamadı.</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>#</th><th>Ad Soyad</th><th>Telefon</th><th>Branş</th><th>Şehir</th><th>Not</th><th>Durum</th><th>Tarih</th><th>İşlem</th>
  </tr></thead><tbody>`;
  data.forEach((row, i) => {
    const p = parseNotlar(row.notlar);
    html += `<tr>
      <td>${i + 1}</td>
      <td><strong>${p.ad}</strong></td>
      <td>${p.telefon}</td>
      <td>${p.brans}</td>
      <td>${p.sehir}</td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.not}">${p.not}</td>
      <td><span class="badge ${row.durum}">${row.durum}</span></td>
      <td style="white-space:nowrap">${formatDate(row.created_at)}</td>
      <td>
        <div class="action-btns">
          ${row.durum !== 'onaylandi' ? `<button class="btn btn-green" onclick="updateDurum('${row.id}','onaylandi')">✓ Onayla</button>` : ''}
          ${row.durum !== 'iptal' ? `<button class="btn btn-red" onclick="updateDurum('${row.id}','iptal')">✗ İptal</button>` : ''}
          <button class="btn btn-gray" onclick="deleteRow('${row.id}')">🗑</button>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('tableContainer').innerHTML = html;
}

async function updateDurum(id, durum) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/randevular?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ durum })
    });
    const row = allData.find(x => x.id === id);
    if (row) row.durum = durum;
    updateStats();
    renderTable();
    toast(durum === 'onaylandi' ? '✅ Randevu onaylandı' : '❌ Randevu iptal edildi');
  } catch (e) {
    toast('Hata oluştu, tekrar deneyin.');
  }
}

async function deleteRow(id) {
  if (!confirm('Bu kaydı silmek istediğinize emin misiniz?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/randevular?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    allData = allData.filter(x => x.id !== id);
    updateStats();
    renderTable();
    toast('🗑 Kayıt silindi');
  } catch (e) {
    toast('Silme hatası, tekrar deneyin.');
  }
}

loadRandevular();
</script>
</body>
</html>
